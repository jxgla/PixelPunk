# PixelPunk Docker Compose 配置
#
# 🚀 推荐使用一键安装脚本（自动配置所有参数）：
#   curl -fsSL https://download.pixelpunk.cc/shell/docker-install.sh | bash
#
# 💡 也可以直接运行（将使用默认配置）：
#   docker-compose up -d
#
# 注意：直接运行将使用默认数据库密码，生产环境请修改 docker-compose.yml 的环境变量

# 安全建议：请先复制 `.env.example` 为 `.env` 并填写强随机密码后再启动
#   cp .env.example .env
#   docker compose --env-file .env up -d

version: '3.8'

services:
  # PixelPunk 主应用
  pixelpunk:
    image: snine98/pixelpunk:latest
    container_name: pixelpunk
    ports:
      - "127.0.0.1:${PORT:-9520}:9520"
    volumes:
      - ./configs/config.docker.yaml:/app/configs/config.yaml:ro
      - ${DATA_DIR:-./data}:/app/data
      - ${LOGS_DIR:-./logs}:/app/logs
      - ${UPLOADS_DIR:-./uploads}:/app/uploads
    environment:
      - TZ=Asia/Shanghai
      - DEPLOY_MODE=compose
      - CONFIG_PRESET=true
      - APP_PORT=9520
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - API_RATE_LIMIT_RPS=${API_RATE_LIMIT_RPS:-8}
      - API_RATE_LIMIT_BURST=${API_RATE_LIMIT_BURST:-16}
      - UPLOAD_RATE_LIMIT_RPS=${UPLOAD_RATE_LIMIT_RPS:-1}
      - UPLOAD_RATE_LIMIT_BURST=${UPLOAD_RATE_LIMIT_BURST:-2}
      - DOWNLOAD_RATE_LIMIT_RPS=${DOWNLOAD_RATE_LIMIT_RPS:-4}
      - DOWNLOAD_RATE_LIMIT_BURST=${DOWNLOAD_RATE_LIMIT_BURST:-8}
      - UPLOAD_PAUSE_THRESHOLD_GB=${UPLOAD_PAUSE_THRESHOLD_GB:-5}
      - UPLOAD_ALLOW_ADMIN_ONLY_WHEN_THRESHOLD_REACHED=${UPLOAD_ALLOW_ADMIN_ONLY_WHEN_THRESHOLD_REACHED:-true}
    depends_on:
      mysql:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - pixelpunk-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9520/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: pixelpunk-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: pixelpunk
      MYSQL_USER: pixelpunk
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD in .env}
      TZ: Asia/Shanghai
    # 端口不对外暴露，仅容器内部访问
    # ports:
    #   - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - ${MYSQL_DATA_DIR:-./data/mysql}:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    networks:
      - pixelpunk-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "pixelpunk", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Qdrant 向量数据库
  qdrant:
    image: qdrant/qdrant:latest
    container_name: pixelpunk-qdrant
    # 端口不对外暴露，仅容器内部访问
    # ports:
    #   - "${QDRANT_PORT:-6333}:6333"
    #   - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - ${QDRANT_DATA_DIR:-./data/qdrant}:/qdrant/storage
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
    networks:
      - pixelpunk-network

  # Redis 缓存（可选）
  redis:
    image: redis:7-alpine
    container_name: pixelpunk-redis
    # 端口不对外暴露，仅容器内部访问
    # ports:
    #   - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ${REDIS_DATA_DIR:-./data/redis}:/data
    environment:
      - TZ=Asia/Shanghai
      - REDIS_PASSWORD=${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    restart: unless-stopped
    networks:
      - pixelpunk-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

# 网络配置
networks:
  pixelpunk-network:
    driver: bridge
